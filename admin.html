<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 사양 옵션 편집</title>
<script src="options.js"></script>
<style>
  :root{
    --mint:#4ECBBA; --mint-deep:#2FA898; --mint-soft:#E8F7F4;
    --navy:#26333C; --navy2:#3A4B56; --ink:#1E2A32; --sub:#5E7078; --faint:#94A5AD;
    --line:#E1E8EA; --line2:#EEF3F4; --bg:#F7FAFA; --card:#FFFFFF; --red:#D96A6A; --gold:#B7791F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 80px}

  /* 로그인 */
  .lock{max-width:360px;margin:80px auto;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:28px;text-align:center}
  .lock .logo{width:52px;height:52px;border-radius:13px;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:24px;margin:0 auto 16px}
  .lock h1{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:6px}
  .lock p{font-size:13px;color:var(--sub);margin-bottom:18px}
  .lock input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;text-align:center;margin-bottom:12px;font-family:inherit}
  .lock input:focus{outline:none;border-color:var(--mint)}
  .lock button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
  .lock .err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  header h1{font-size:20px;font-weight:800;color:var(--navy)}
  .headbtns{display:flex;gap:8px}
  .subtitle{color:var(--sub);font-size:13px;margin-bottom:20px}

  .btn{padding:9px 15px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit;transition:all .15s}
  .btn:hover{border-color:var(--mint);color:var(--mint-deep)}
  .btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
  .btn.primary:hover{background:var(--mint-deep);border-color:var(--mint-deep);color:#fff}
  .btn.mint{background:var(--mint);border-color:var(--mint);color:#fff}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn.dng{color:var(--red)}
  .btn.dng:hover{border-color:var(--red);background:#FBEAEA}

  /* 품목 카드 */
  .prod-card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .prod-head{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--mint-soft);cursor:pointer}
  .prod-head .icon{font-size:18px}
  .prod-head input.pname{flex:1;border:none;background:transparent;font-size:15px;font-weight:800;color:var(--navy);font-family:inherit}
  .prod-head input.pname:focus{outline:none;background:#fff;border-radius:6px;padding:2px 6px}
  .prod-body{padding:16px;display:none}
  .prod-body.open{display:block}
  .prod-key{font-size:11px;color:var(--faint);font-family:monospace;margin-bottom:12px}

  /* 사양 필드 행 */
  .fld{border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:10px;background:#FCFDFD}
  .fld-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .fld-top input.flabel{border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;min-width:120px;font-family:inherit}
  .fld-top select.ftype{border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;font-family:inherit;cursor:pointer}
  .fld-top .fkey{font-size:11px;color:var(--faint);font-family:monospace}
  .fld-opts{margin-top:6px}
  .fld-opts label{font-size:11.5px;color:var(--sub);font-weight:600;display:block;margin-bottom:4px}
  .fld-opts textarea{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:inherit;resize:vertical;min-height:44px;line-height:1.5}
  .fld-opts .tip{font-size:11px;color:var(--faint);margin-top:6px}
  .opt-tags{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0;min-height:8px}
  .opt-tag{display:inline-flex;align-items:center;gap:5px;padding:6px 8px 6px 7px;background:var(--mint-soft);border:1.5px solid var(--mint);border-radius:8px;font-size:12.5px;font-weight:600;color:var(--mint-deep);cursor:grab;user-select:none;transition:transform .1s,box-shadow .1s}
  .opt-tag:active{cursor:grabbing}
  .opt-tag.dragging{opacity:.4}
  .opt-tag.drag-over{box-shadow:-3px 0 0 var(--navy);transform:translateX(2px)}
  .opt-tag .drag-dot{color:var(--faint);font-size:11px;letter-spacing:-2px;cursor:grab}
  .opt-tag .opt-x{background:none;border:none;color:var(--mint-deep);opacity:.55;cursor:pointer;font-size:11px;padding:0 1px;font-weight:700}
  .opt-tag .opt-x:hover{opacity:1;color:var(--red)}
  .opt-add{display:flex;gap:6px;margin-top:4px}
  .opt-add input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;font-family:inherit}
  .opt-add input:focus{outline:none;border-color:var(--mint)}
  .fld-ph{margin-top:6px}
  .fld-ph input{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;font-family:inherit}

  .addfld{width:100%;padding:10px;border:1.5px dashed var(--mint);border-radius:9px;background:var(--mint-soft);color:var(--mint-deep);font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;margin-top:4px}
  .addprod{width:100%;padding:14px;border:2px dashed var(--navy2);border-radius:12px;background:#fff;color:var(--navy2);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:6px}

  .bar{position:sticky;bottom:0;background:rgba(247,250,250,.95);backdrop-filter:blur(6px);border-top:1.5px solid var(--line);padding:14px 0;margin-top:24px;display:flex;gap:10px;justify-content:flex-end}
  .genbox{background:var(--navy);color:#fff;border-radius:14px;padding:20px;margin-top:20px;display:none}
  .genbox h3{font-size:15px;font-weight:800;margin-bottom:8px}
  .genbox p{font-size:12.5px;color:#B9C6CD;margin-bottom:12px;line-height:1.6}
  .genbox textarea{width:100%;min-height:180px;border:none;border-radius:9px;padding:12px;font-family:monospace;font-size:11.5px;line-height:1.5;background:#1A242B;color:#7FE3D4;resize:vertical}
  .genbox .gbtns{display:flex;gap:8px;margin-top:10px}
</style>
</head>
<body>
<!-- 로그인 -->
<div id="lock" class="lock">
  <div class="logo">U</div>
  <h1>관리자 페이지</h1>
  <p>사양 옵션을 편집하려면 비밀번호를 입력하세요.</p>
  <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">들어가기</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- 편집 화면 -->
<div class="wrap" id="admin" style="display:none">
  <header>
    <h1>사양 옵션 편집</h1>
    <div class="headbtns">
      <button class="btn" onclick="if(confirm('편집을 취소하고 처음 상태로 되돌릴까요?'))location.reload()">되돌리기</button>
      <button class="btn primary" onclick="generateFile()">＋ 적용 파일 생성</button>
    </div>
  </header>
  <p class="subtitle">품목별 사양과 드롭다운 옵션을 수정할 수 있어요. 다 되면 <b>[적용 파일 생성]</b>으로 options.js를 받아 GitHub에 올리면 문의 폼에 반영됩니다.</p>

  <div id="prodList"></div>
  <button class="addprod" onclick="addProd()">＋ 새 품목 추가</button>

  <div class="genbox" id="genbox">
    <h3>📎 options.js 생성 완료</h3>
    <p>아래 코드가 새 <b>options.js</b> 파일 내용이에요. [파일 다운로드]로 받아서 GitHub 레포의 기존 options.js를 교체 업로드하면 끝!</p>
    <textarea id="genText" readonly></textarea>
    <div class="gbtns">
      <button class="btn mint" onclick="downloadFile()">⬇ 파일 다운로드</button>
      <button class="btn" onclick="copyText()">복사</button>
    </div>
  </div>

  <div class="bar">
    <button class="btn primary" onclick="generateFile()">＋ 적용 파일 생성</button>
  </div>
</div>

<script>
/* ====== 비밀번호 (원하면 바꾸세요) ====== */
const ADMIN_PW = "union0929";

function login(){
  const v = document.getElementById('pw').value;
  if(v===ADMIN_PW){
    sessionStorage.setItem('union_admin_ok','1');
    showAdmin();
  }else{
    document.getElementById('loginErr').textContent = '비밀번호가 올바르지 않습니다.';
  }
}
if(sessionStorage.getItem('union_admin_ok')==='1') showAdmin();

function showAdmin(){
  document.getElementById('lock').style.display='none';
  document.getElementById('admin').style.display='block';
  loadData();
}

// 편집용 데이터 (깊은 복사)
let data = {};
function loadData(){
  data = JSON.parse(JSON.stringify(window.UNION_PRODUCT_SPECS||{}));
  renderProds();
}

function renderProds(){
  const box = document.getElementById('prodList');
  box.innerHTML = Object.keys(data).map(key=>{
    const p = data[key];
    const fields = (p.fields||[]).map((f,fi)=>fieldHtml(key,fi,f)).join('');
    return `<div class="prod-card">
      <div class="prod-head" onclick="toggleBody(this)">
        <span class="icon">${p.icon||'📦'}</span>
        <input class="pname" value="${esc(p.label)}" onclick="event.stopPropagation()" onchange="setProdLabel('${key}',this.value)">
        <button class="btn sm dng" onclick="event.stopPropagation();delProd('${key}')">품목 삭제</button>
      </div>
      <div class="prod-body">
        <div class="prod-key">품목 코드: ${key} · 아이콘: <input value="${esc(p.icon||'')}" style="width:44px;border:1px solid var(--line);border-radius:6px;padding:3px;text-align:center" onchange="setProdIcon('${key}',this.value)"></div>
        <div id="flds-${key}">${fields}</div>
        <button class="addfld" onclick="addField('${key}')">＋ 사양 항목 추가</button>
      </div>
    </div>`;
  }).join('');
}

function fieldHtml(pkey,fi,f){
  const isSelect = f.type==='select';
  return `<div class="fld">
    <div class="fld-top">
      <input class="flabel" value="${esc(f.label)}" onchange="setFieldLabel('${pkey}',${fi},this.value)" placeholder="사양 이름">
      <select class="ftype" onchange="setFieldType('${pkey}',${fi},this.value)">
        <option value="select" ${f.type==='select'?'selected':''}>드롭다운 선택</option>
        <option value="text" ${f.type==='text'?'selected':''}>직접 입력(글자)</option>
        <option value="number" ${f.type==='number'?'selected':''}>직접 입력(숫자)</option>
      </select>
      <span class="fkey">${f.key}</span>
      <button class="btn sm dng" style="margin-left:auto" onclick="delField('${pkey}',${fi})">삭제</button>
    </div>
    ${isSelect?`<div class="fld-opts">
      <label>선택 옵션 <span style="font-weight:400;color:var(--faint)">— 태그를 드래그하면 순서가 바뀌어요</span></label>
      <div class="opt-tags" id="opts-${pkey}-${fi}" data-pkey="${pkey}" data-fi="${fi}">
        ${(f.options||[]).map((o,oi)=>optTagHtml(pkey,fi,oi,o)).join('')}
      </div>
      <div class="opt-add">
        <input type="text" id="optadd-${pkey}-${fi}" placeholder="옵션 입력 후 Enter (예: A4)" onkeydown="if(event.key==='Enter'){event.preventDefault();addOpt('${pkey}',${fi});}">
        <button class="btn sm" onclick="addOpt('${pkey}',${fi})">＋ 추가</button>
      </div>
      <div class="tip">※ "잘 모르겠음 (전문가 추천)"은 자동으로 맨 끝에 추가돼요. "직접입력" 태그를 넣으면 고객이 직접 쓸 수 있어요.</div>
    </div>`:`<div class="fld-ph">
      <input value="${esc(f.placeholder||'')}" onchange="setFieldPh('${pkey}',${fi},this.value)" placeholder="입력칸 안내문구 (예: 예: 100부)">
    </div>`}
  </div>`;
}

// 옵션 태그 하나
function optTagHtml(pkey,fi,oi,val){
  return `<span class="opt-tag" draggable="true" data-oi="${oi}"
    ondragstart="optDragStart(event,'${pkey}',${fi},${oi})"
    ondragover="optDragOver(event)"
    ondrop="optDrop(event,'${pkey}',${fi},${oi})"
    ondragend="optDragEnd(event)">
    <span class="drag-dot">⠿</span>${esc(val)}<button class="opt-x" onclick="delOpt('${pkey}',${fi},${oi})">✕</button>
  </span>`;
}

function renderOptTags(pkey,fi){
  const box=document.getElementById(`opts-${pkey}-${fi}`);
  if(box) box.innerHTML=(data[pkey].fields[fi].options||[]).map((o,oi)=>optTagHtml(pkey,fi,oi,o)).join('');
}
function addOpt(pkey,fi){
  const inp=document.getElementById(`optadd-${pkey}-${fi}`);
  const v=(inp.value||'').trim();
  if(!v) return;
  data[pkey].fields[fi].options=data[pkey].fields[fi].options||[];
  if(data[pkey].fields[fi].options.includes(v)){ alert('이미 있는 옵션이에요.'); return; }
  data[pkey].fields[fi].options.push(v);
  inp.value=''; renderOptTags(pkey,fi); inp.focus();
}
function delOpt(pkey,fi,oi){
  data[pkey].fields[fi].options.splice(oi,1);
  renderOptTags(pkey,fi);
}
// 드래그 순서 변경
let dragSrc=null;
function optDragStart(e,pkey,fi,oi){ dragSrc={pkey,fi,oi}; e.dataTransfer.effectAllowed='move'; e.target.closest('.opt-tag').classList.add('dragging'); }
function optDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; const t=e.target.closest('.opt-tag'); if(t) t.classList.add('drag-over'); }
function optDrop(e,pkey,fi,oi){
  e.preventDefault();
  if(!dragSrc||dragSrc.pkey!==pkey||dragSrc.fi!==fi) return;
  const opts=data[pkey].fields[fi].options;
  const [moved]=opts.splice(dragSrc.oi,1);
  opts.splice(oi,0,moved);
  renderOptTags(pkey,fi);
}
function optDragEnd(e){ document.querySelectorAll('.opt-tag').forEach(t=>{t.classList.remove('dragging','drag-over');}); dragSrc=null; }

function toggleBody(head){ head.nextElementSibling.classList.toggle('open'); }

/* ==== 편집 액션 ==== */
function setProdLabel(k,v){ data[k].label=v; }
function setProdIcon(k,v){ data[k].icon=v; }
function delProd(k){ if(confirm(`'${data[k].label}' 품목을 삭제할까요?`)){ delete data[k]; renderProds(); } }
function addProd(){
  const key = prompt('새 품목의 코드를 영문·숫자로 입력하세요 (예: sticker)','');
  if(!key) return;
  if(!/^[a-z0-9_]+$/i.test(key)){ alert('영문·숫자·밑줄(_)만 사용해 주세요.'); return; }
  if(data[key]){ alert('이미 있는 코드예요.'); return; }
  data[key] = { label:'새 품목', icon:'📦', fields:[] };
  renderProds();
  // 새로 추가한 카드 펼치기
  setTimeout(()=>{ const cards=document.querySelectorAll('.prod-card'); const last=cards[cards.length-1]; if(last) last.querySelector('.prod-body').classList.add('open'); },50);
}

function mkKey(){ return 'f'+Date.now().toString(36)+Math.floor(Math.random()*99).toString(36); }
function addField(pkey){
  data[pkey].fields = data[pkey].fields||[];
  data[pkey].fields.push({ key:mkKey(), label:'새 사양', type:'select', options:[] });
  document.getElementById('flds-'+pkey).innerHTML = data[pkey].fields.map((f,fi)=>fieldHtml(pkey,fi,f)).join('');
}
function delField(pkey,fi){ data[pkey].fields.splice(fi,1); document.getElementById('flds-'+pkey).innerHTML = data[pkey].fields.map((f,i)=>fieldHtml(pkey,i,f)).join(''); }
function setFieldLabel(pkey,fi,v){ data[pkey].fields[fi].label=v; }
function setFieldType(pkey,fi,v){
  data[pkey].fields[fi].type=v;
  if(v==='select' && !data[pkey].fields[fi].options) data[pkey].fields[fi].options=[];
  document.getElementById('flds-'+pkey).innerHTML = data[pkey].fields.map((f,i)=>fieldHtml(pkey,i,f)).join('');
}
function setFieldOpts(pkey,fi,v){ data[pkey].fields[fi].options = v.split(/[,\n]/).map(s=>s.trim()).filter(Boolean); }
function setFieldPh(pkey,fi,v){ data[pkey].fields[fi].placeholder=v; }

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ==== 파일 생성 ==== */
function buildFileText(){
  const body = JSON.stringify(data,null,2);
  return `/* ============================================================
   유니온 인쇄출판 — 제작문의 사양 옵션 데이터
   관리자 페이지에서 자동 생성됨 · ${new Date().toLocaleString('ko-KR')}
   이 파일을 GitHub 레포의 options.js에 교체 업로드하세요.
   ============================================================ */
window.UNION_PRODUCT_SPECS = ${body};
`;
}
function generateFile(){
  document.getElementById('genText').value = buildFileText();
  document.getElementById('genbox').style.display='block';
  document.getElementById('genbox').scrollIntoView({behavior:'smooth'});
}
function downloadFile(){
  const blob = new Blob([buildFileText()],{type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download='options.js'; a.click();
}
function copyText(){
  const t = document.getElementById('genText');
  t.select(); document.execCommand('copy');
  alert('복사됐어요. options.js 파일에 붙여넣어 사용하세요.');
}
</script>
</body>
</html>
