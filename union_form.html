<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유니온인쇄출판 제작 문의</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f7f7f5; min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px;
}
.card {
  background: #fff; border-radius: 16px;
  border: 1px solid #e5e5e3; padding: 40px 36px;
  width: 100%; max-width: 580px;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #2bbfa0, #1a8f75);
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; color: white; font-weight: 700; font-size: 16px;
}
.logo-text { font-size: 16px; font-weight: 700; color: #222; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: #888; letter-spacing: 1px; }
h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
.desc { font-size: 14px; color: #777; margin-bottom: 32px; line-height: 1.6; }

.item-sheet {
  border: 1px solid #e0e0de; border-radius: 12px;
  padding: 20px; margin-bottom: 14px; background: #fafafa;
}
.item-sheet.first { border-color: #2bbfa0; background: #f8fdfb; }
.sheet-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.sheet-label { font-size: 13px; font-weight: 700; color: #2bbfa0; letter-spacing: 0.5px; }
.remove-btn {
  background: none; border: 1px solid #ddd; border-radius: 6px;
  font-size: 12px; color: #999; padding: 3px 10px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.remove-btn:hover { border-color: #e05; color: #e05; }

.sec-title {
  font-size: 11px; font-weight: 700; color: #2bbfa0;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 10px; margin-top: 16px;
}
.sec-title:first-child { margin-top: 0; }

.radio-group { display: flex; flex-wrap: wrap; gap: 7px; }
.radio-item {
  display: flex; align-items: center;
  background: #fff; border: 1px solid #e5e5e3;
  border-radius: 20px; padding: 6px 13px;
  cursor: pointer; transition: all 0.15s; font-size: 13px; color: #444;
}
.radio-item:has(input:checked) {
  background: #e8f9f4; border-color: #2bbfa0; color: #0f6e56; font-weight: 500;
}
.radio-item input { display: none; }

.sub-options {
  display: none;
  background: #fff; border: 1px solid #d8f3ec;
  border-radius: 10px; padding: 16px; margin-top: 12px;
}
.sub-options.visible { display: block; }
.sub-label { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 8px; }
.sub-radio-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.sub-radio-item {
  display: flex; align-items: center;
  background: #f5f5f3; border: 1px solid #e5e5e3;
  border-radius: 16px; padding: 5px 11px;
  cursor: pointer; font-size: 12px; color: #555; transition: all 0.15s;
}
.sub-radio-item:has(input:checked) {
  background: #e8f9f4; border-color: #2bbfa0; color: #0f6e56; font-weight: 500;
}
.sub-radio-item input { display: none; }

.direct-input { display: none; margin-top: 8px; }
.direct-input.visible { display: block; }

.fl { display: block; font-size: 13px; color: #444; margin-bottom: 5px; font-weight: 500; }
input[type=text], input[type=email], input[type=tel], textarea, select {
  width: 100%; padding: 10px 13px;
  border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; color: #222; background: #fff;
  transition: border-color 0.2s; font-family: inherit;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: #2bbfa0; }
textarea { resize: vertical; min-height: 70px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { margin-bottom: 12px; }

.add-btn {
  width: 100%; padding: 12px;
  background: #fff; color: #2bbfa0;
  border: 1.5px dashed #2bbfa0; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  margin-bottom: 24px; transition: background 0.15s; font-family: inherit;
}
.add-btn:hover { background: #f0fbf7; }
.divider { border: none; border-top: 1.5px solid #eee; margin: 24px 0; }
.contact-title {
  font-size: 12px; font-weight: 700; color: #888;
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px;
}
.submit-btn {
  width: 100%; padding: 14px; background: #2bbfa0; color: #fff;
  border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: background 0.2s; font-family: inherit;
}
.submit-btn:hover { background: #1a9e84; }
.footer-note { font-size: 12px; color: #aaa; text-align: center; margin-top: 12px; }
.required { color: #e05; font-size: 11px; margin-left: 2px; }
.success-msg {
  display: none; background: #e8f9f4; border: 1px solid #2bbfa0;
  border-radius: 10px; padding: 24px; text-align: center;
  color: #0f6e56; font-size: 15px; line-height: 1.8;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">U</div>
    <div>
      <div class="logo-text">유니온인쇄출판</div>
      <div class="logo-sub">UNION PRINTING</div>
    </div>
  </div>
  <h1>제작 문의</h1>
  <p class="desc">필요한 내용을 작성해 주시면 목적에 맞는 제작 방식과 견적을 안내드립니다.</p>

  <form action="https://formsubmit.co/union0929@daum.net" method="POST" id="inquiryForm">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_subject" value="[유니온인쇄출판] 새 제작 문의가 접수되었습니다">

    <div class="field" style="margin-bottom:24px">
      <label class="fl">문의 제목 <span class="required">*</span></label>
      <input type="text" name="문의제목" placeholder="예: 행사 홍보물 제작 문의" required>
    </div>

    <div id="sheetsContainer"></div>

    <button type="button" class="add-btn" id="addSheetBtn">+ 다른 품목 추가하기</button>

    <hr class="divider">

    <div class="field">
      <div class="contact-title">납품 및 연락처 정보</div>
      <label class="fl">납품 장소 <span class="required">*</span></label>
      <input type="text" name="납품장소" placeholder="예: OO특별시 OO구 OO동 OO로 00" required>
    </div>
    <div class="field">
      <label class="fl">수령 방법</label>
      <select name="수령방법">
        <option value="">선택해주세요</option>
        <option>배송 요청</option>
        <option>직접 방문 수령</option>
        <option>용달 & 경동택배</option>
        <option>미정</option>
      </select>
    </div>
    <div class="row">
      <div class="field">
        <label class="fl">이름 / 담당자명 <span class="required">*</span></label>
        <input type="text" name="이름" placeholder="홍길동" required>
      </div>
      <div class="field">
        <label class="fl">연락처 <span class="required">*</span></label>
        <input type="tel" name="연락처" placeholder="010-0000-0000" required>
      </div>
    </div>
    <div class="field">
      <label class="fl">이메일</label>
      <input type="email" name="이메일" placeholder="example@email.com">
    </div>

    <button type="submit" class="submit-btn">문의 접수하기</button>
    <p class="footer-note">접수 후 영업일 기준 1~2일 내 연락드립니다.</p>
  </form>
  <div class="success-msg" id="successMsg">
    ✅ 문의가 정상적으로 접수되었습니다.<br>빠른 시일 내에 연락드리겠습니다. 감사합니다!
  </div>
</div>

<script>
const ITEMS = ['리플렛','브로슈어','포스터','전단','책자·보고서','현수막','X배너','명함','봉투','명찰','친환경 제작물','기타'];

const SUB_OPTIONS = {
  '리플렛': [
    { label: '규격', name: '규격', options: ['3단접지 (A4)', '2단접지 (A4)', 'A5', 'A6', '직접입력'] },
    { label: '후가공', name: '후가공', options: ['유광 코팅', '무광 코팅', '없음', '직접입력'] }
  ],
  '브로슈어': [
    { label: '규격', name: '규격', options: ['A4', 'A5', 'B5', '직접입력'] },
    { label: '제본 방식', name: '제본방식', options: ['중철제본', '접지', '직접입력'] },
    { label: '후가공', name: '후가공', options: ['유광 코팅', '무광 코팅', '없음', '직접입력'] }
  ],
  '포스터': [
    { label: '규격', name: '규격', options: ['A1', 'A2', 'A3', 'A4', '직접입력'] },
    { label: '후가공', name: '후가공', options: ['유광 코팅', '무광 코팅', '없음', '직접입력'] }
  ],
  '전단': [
    { label: '규격', name: '규격', options: ['A4', 'A5', 'B5', '직접입력'] },
    { label: '인쇄 방식', name: '인쇄방식', options: ['양면', '단면'] },
    { label: '후가공', name: '후가공', options: ['유광 코팅', '무광 코팅', '없음', '직접입력'] }
  ],
  '책자·보고서': [
    { label: '규격', name: '규격', options: ['A4', 'A5', 'B5', '직접입력'] },
    { label: '인쇄 색상', name: '인쇄색상', options: ['칼라', '흑백', '표지 칼라 + 내지 흑백'] },
    { label: '제본 방식', name: '제본방식', options: ['무선제본', '중철제본', '링제본', '스프링제본', '미정'] },
    { label: '후가공 (표지)', name: '후가공', options: ['유광 코팅', '무광 코팅', '없음', '직접입력'] }
  ],
  '현수막': [
    { label: '사이즈 (가로 × 세로)', name: '사이즈', options: ['직접입력'] },
    { label: '후가공', name: '후가공', options: ['아일렛 - 노끈', '아일렛 - 큐방', '대나무 - 노끈', '열재단', '봉마감 (대나무 제외)', '미싱', '직접입력'] },
    { label: '설치 여부', name: '설치여부', options: ['설치 필요', '설치 불필요', '미정'] }
  ],
  'X배너': [
    { label: '규격', name: '규격', options: ['600×1600mm', '800×1800mm', '직접입력'] },
    { label: '재질', name: '재질', options: ['PET'] },
    { label: '거치대', name: '거치대', options: ['거치대 포함', '거치대 미포함'] }
  ],
  '명함': [
    { label: '용지 종류', name: '용지', options: ['일반지 (500매)', '고급지 (200매)', '특수지 (수량 문의)'] },
    { label: '후가공', name: '후가공', options: ['유광 코팅', '무광 코팅', '박 (금/은)', '형압', '에폭시', '없음', '직접입력'] }
  ],
  '봉투': [
    { label: '종류', name: '종류', options: ['소봉투', '중봉투', '대봉투', '직접입력'] },
    { label: '후가공', name: '후가공', options: ['창봉투', '양면테이프', '없음', '직접입력'] }
  ],
  '명찰': [
    { label: '종류', name: '종류', options: ['목걸이명찰', '아크릴명찰'] },
    { label: '규격 (직접입력)', name: '규격', options: ['직접입력'] }
  ],
  '친환경 제작물': [
    { label: '품목 및 규격 (직접입력)', name: '품목및규격', options: ['직접입력'] },
    { label: '_notice', name: '_notice', options: ['_notice'] }
  ],
  '기타': [
    { label: '품목 및 내용 (직접입력)', name: '품목및내용', options: ['직접입력'] }
  ]
};

let count = 0;

function buildSubOptions(item, idx) {
  const subs = SUB_OPTIONS[item];
  if (!subs) return '';
  return subs.map((sub) => {
    const key = `${sub.name}_${idx}`;

    // 친환경 안내문
    if (sub.name === '_notice') {
      return `
        <div style="background:#fff8e1;border:2px solid #f5a623;border-radius:8px;padding:14px 16px;margin-top:4px;font-size:12px;color:#7a4f00;line-height:1.8;">
          <div style="font-size:13px;font-weight:700;color:#c47d00;margin-bottom:6px;">⚠️ 친환경 인쇄 제작 안내</div>
          🌿 <strong>콩기름 인쇄</strong>, <strong>친환경 종이 인증서</strong>가 필요하신 경우 아래 요청사항란에 작성해주세요.<br><br>
          <span style="background:#ffe082;padding:2px 6px;border-radius:4px;font-weight:700;">⏰ 제작 기간이 일반 인쇄보다 길어질 수 있습니다.</span><br>
          소재 수급 및 제작 공정에 따라 납기가 지연될 수 있으므로,<br>견적 문의 시 <strong>희망 납기일을 반드시 함께 알려주세요.</strong>
        </div>`;
    }

    // 직접입력만 있는 경우
    const directOnly = sub.options.length === 1 && sub.options[0] === '직접입력';
    if (directOnly) {
      return `
        <div class="sub-label" style="margin-top:10px">${sub.label}</div>
        <input type="text" name="${key}" placeholder="직접 입력해주세요" style="margin-top:4px">
      `;
    }

    const hasDirectInput = sub.options.includes('직접입력');
    const radios = sub.options.map(opt => {
      if (opt === '직접입력') return `
        <label class="sub-radio-item"><input type="radio" name="${key}" value="직접입력">직접입력</label>`;
      return `<label class="sub-radio-item"><input type="radio" name="${key}" value="${opt}">${opt}</label>`;
    }).join('');
    const directField = hasDirectInput ? `
      <div class="direct-input" id="direct_${key}">
        <input type="text" name="${key}_직접" placeholder="직접 입력해주세요">
      </div>` : '';
    return `
      <div class="sub-label" style="margin-top:10px">${sub.label}</div>
      <div class="sub-radio-group">${radios}</div>
      ${directField}
    `;
  }).join('');
}

function toggleDirect(radioLabel, directId) {
  const el = document.getElementById(directId);
  if (el) {
    el.classList.add('visible');
    const input = el.querySelector('input');
    if (input) setTimeout(() => input.focus(), 50);
  }
  const group = radioLabel.closest('.sub-radio-group');
  if (group) {
    group.querySelectorAll('.sub-radio-item').forEach(lbl => {
      if (lbl !== radioLabel) {
        const val = lbl.querySelector('input').value;
        const dId = 'direct_' + lbl.closest('.sub-options').querySelector(`input[name]`)?.name?.replace('_직접','');
        if (val !== '직접입력') {
          const otherDirect = lbl.closest('.sub-options').querySelector('.direct-input');
        }
      }
    });
  }
}

function handleRadioChange(sheet, idx) {
  const selected = sheet.querySelector(`input[name="품목_${idx}"]:checked`);
  const subBox = sheet.querySelector('.sub-options');
  const subInner = sheet.querySelector('.sub-inner');
  if (!selected) { subBox.classList.remove('visible'); return; }
  const item = selected.value;
  subInner.innerHTML = buildSubOptions(item, idx);
  subBox.classList.add('visible');

  subInner.querySelectorAll('.sub-radio-group').forEach(grp => {
    grp.querySelectorAll('input[type=radio]').forEach(radio => {
      radio.addEventListener('change', function() {
        const directId = 'direct_' + this.name;
        const directEl = document.getElementById(directId);
        if (directEl) {
          if (this.value === '직접입력') {
            directEl.classList.add('visible');
          } else {
            directEl.classList.remove('visible');
          }
        }
      });
    });
  });
}

function createSheet(idx, isFirst) {
  const sheet = document.createElement('div');
  sheet.className = 'item-sheet' + (isFirst ? ' first' : '');
  sheet.dataset.index = idx;
  sheet.innerHTML = `
    <div class="sheet-header">
      <span class="sheet-label">제작 품목 ${idx}</span>
      ${isFirst ? '' : '<button type="button" class="remove-btn" onclick="this.closest(\'.item-sheet\').remove()">✕ 삭제</button>'}
    </div>

    <div class="sec-title">품목 선택</div>
    <div class="radio-group">
      ${ITEMS.map(item => `<label class="radio-item"><input type="radio" name="품목_${idx}" value="${item}">${item}</label>`).join('')}
    </div>

    <div class="sub-options" id="sub_${idx}">
      <div class="sub-inner"></div>
    </div>

    <div class="sec-title" style="margin-top:16px">제작 정보</div>
    <div class="row">
      <div class="field">
        <label class="fl">예상 수량</label>
        <input type="text" name="수량_${idx}" placeholder="예: 500부">
      </div>
      <div class="field">
        <label class="fl">희망 납품일</label>
        <input type="text" name="납품일_${idx}" placeholder="예: 5월 20일">
      </div>
    </div>
    <div class="field">
      <label class="fl">디자인 여부</label>
      <select name="디자인여부_${idx}">
        <option value="">선택해주세요</option>
        <option>디자인 포함 제작</option>
        <option>인쇄만 진행 (파일 있음)</option>
        <option>기존 파일 수정 후 인쇄</option>
        <option>미정 / 상담 후 결정</option>
      </select>
    </div>
    <div class="field">
      <label class="fl">추가 요청사항</label>
      <textarea name="요청사항_${idx}" placeholder="색상, 후가공, 특이사항 등 자유롭게 작성해주세요."></textarea>
    </div>
  `;
  sheet.querySelectorAll(`input[name="품목_${idx}"]`).forEach(radio => {
    radio.addEventListener('change', () => handleRadioChange(sheet, idx));
  });
  return sheet;
}

function addSheet(isFirst) {
  count++;
  const sheet = createSheet(count, isFirst);
  document.getElementById('sheetsContainer').appendChild(sheet);
}

addSheet(true);
document.getElementById('addSheetBtn').addEventListener('click', () => addSheet(false));

document.getElementById('inquiryForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  try {
    const res = await fetch(form.action, {
      method: 'POST', body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      form.style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    } else {
      alert('오류가 발생했습니다. 다시 시도해주세요.');
    }
  } catch(err) {
    alert('네트워크 오류입니다. 다시 시도해주세요.');
  }
});
</script>
</body>
</html>
